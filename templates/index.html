<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSTATS // Deep Packet Analyzer</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --grid: #1a1a24;
            --text: #00ffcc;
            --alert: #ff0055;
            --ai: #bd00ff;
            --border: #333344;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            background-image: linear-gradient(var(--grid) 1px, transparent 1px),
                              linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        h1 {
            text-shadow: 0 0 10px var(--text);
            border-bottom: 1px solid var(--text);
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .panel {
            background: rgba(10, 10, 12, 0.8);
            border: 1px solid var(--border);
            padding: 15px;
            box-shadow: inset 0 0 15px rgba(0, 255, 204, 0.05);
        }
        .panel h2 {
            margin-top: 0;
            font-size: 1.2em;
            color: #fff;
        }
        .stat-grid {
            display: grid;
            /* Expanded to 4 columns for the new protocols */
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px;
        }
        .stat-box {
            border: 1px solid var(--text);
            padding: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-top: 5px;
        }
        .log-box {
            height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border);
            padding: 10px;
            background: #000;
            font-size: 0.9em;
        }
        .log-entry.alert { color: var(--alert); }
        .log-entry.ai { color: var(--ai); }
    </style>
</head>
<body>

    <h1>[ SYS_NET_ANALYST ] // Live Interface Status</h1>

    <div class="dashboard">
        <div class="panel">
            <h2>PROTOCOL TRAFFIC</h2>
            <div class="stat-grid">
                <div class="stat-box">IP<div class="stat-value" id="val-IP">0</div></div>
                <div class="stat-box">TCP<div class="stat-value" id="val-TCP">0</div></div>
                <div class="stat-box">UDP<div class="stat-value" id="val-UDP">0</div></div>
                <div class="stat-box">HTTP<div class="stat-value" id="val-HTTP">0</div></div>
                <div class="stat-box">FTP<div class="stat-value" id="val-FTP">0</div></div>
                <div class="stat-box">SMTP<div class="stat-value" id="val-SMTP">0</div></div>
                <div class="stat-box">SSH<div class="stat-value" id="val-SSH">0</div></div>
                <div class="stat-box">TELNET<div class="stat-value" id="val-Telnet">0</div></div>
            </div>
            <p>AI Queue Backlog: <span id="val-Queue" style="color: var(--ai); font-weight: bold;">0</span></p>
        </div>

        <div class="panel">
            <h2>THREAT & AI INTELLIGENCE FEED</h2>
            <div class="log-box" id="log-container">
                </div>
        </div>
    </div>

    <script>
        setInterval(async () => {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();

                // Update Counters
                document.getElementById('val-IP').innerText = data.counters.IP;
                document.getElementById('val-TCP').innerText = data.counters.TCP;
                document.getElementById('val-UDP').innerText = data.counters.UDP;
                document.getElementById('val-HTTP').innerText = data.counters.HTTP;
                document.getElementById('val-FTP').innerText = data.counters.FTP;
                document.getElementById('val-SMTP').innerText = data.counters.SMTP;
                document.getElementById('val-SSH').innerText = data.counters.SSH;
                document.getElementById('val-Telnet').innerText = data.counters.Telnet;
                document.getElementById('val-Queue').innerText = data.queue_size;

                // Update Logs
                const logBox = document.getElementById('log-container');
                logBox.innerHTML = ''; 
                data.logs.forEach(log => {
                    const div = document.createElement('div');
                    div.className = `log-entry ${log.type}`;
                    div.innerText = `[${log.timestamp}] ${log.message}`;
                    logBox.appendChild(div);
                });
                
            } catch (err) {
                console.error("Connection lost to backend.", err);
            }
        }, 1000);
    </script>
</body>
</html>
